name: Static Site CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: none
          coverage: none

      - name: Validate PHP syntax
        run: |
          set -e
          find . -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Check required pages
        run: |
          test -f index.html
          test -f contact.html
          test -f tests.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to hosting server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/data/**
            **/.DS_Store
            README.md
            QUICKSTART.md