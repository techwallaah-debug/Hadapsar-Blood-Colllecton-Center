name: Static Site CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate PHP syntax
        run: |
          set -e
          find . -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Check required pages
        run: |
          test -f index.html
          test -f contact.html
          test -f tests.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -eu
          missing=""
          [ -n "${FTP_SERVER:-}" ] || missing="$missing FTP_SERVER"
          [ -n "${FTP_USERNAME:-}" ] || missing="$missing FTP_USERNAME"
          [ -n "${FTP_PASSWORD:-}" ] || missing="$missing FTP_PASSWORD"
          [ -n "${FTP_SERVER_DIR:-}" ] || missing="$missing FTP_SERVER_DIR"

          if [ -n "$missing" ]; then
            echo "❌ Missing GitHub Actions secrets:$missing"
            echo "Set them in Settings → Secrets and variables → Actions before deploying."
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp inetutils-tools netcat-openbsd

      - name: Test FTP connectivity
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set -eu
          echo "Testing FTP connectivity to $FTP_SERVER:21..."
          getent hosts "$FTP_SERVER" || true
          nc -vz "$FTP_SERVER" 21 || true

      - name: Deploy via FTP/FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -eu

          FTP_SERVER_DIR="${FTP_SERVER_DIR%/}"
          case "$FTP_SERVER_DIR" in
            /public_html|public_html)
              FTP_SERVER_DIR="/public_html"
              ;;
            /*) ;;
            *) FTP_SERVER_DIR="/${FTP_SERVER_DIR}" ;;
          esac

          echo "🚀 Deploying to $FTP_USERNAME@$FTP_SERVER:$FTP_SERVER_DIR..."

          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            if printf '%s\n' \
              "set ssl:verify-certificate no" \
              "set ftp:ssl-allow yes" \
              "set net:max-retries 1" \
              "set net:timeout 20" \
              "mirror --reverse --delete --verbose --exclude-glob .git* --exclude-glob .github/ --exclude-glob node_modules/ --exclude-glob data/ --exclude-glob .DS_Store --exclude-glob README.md --exclude-glob QUICKSTART.md --exclude-glob '*.jsonl' --exclude-glob package-lock.json ./ \"$FTP_SERVER_DIR\"" \
              "bye" | lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER"; then
              echo "✅ Deployment successful!"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "❌ Attempt $attempt failed. Retrying in 10 seconds..."
            fi
          done

          echo "❌ All 3 deployment attempts failed."
          exit 1