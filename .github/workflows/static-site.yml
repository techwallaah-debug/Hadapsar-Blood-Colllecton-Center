name: Static Site CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate PHP syntax
        run: |
          set -e
          find . -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Check required pages
        run: |
          test -f index.html
          test -f contact.html
          test -f tests.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PATH: ${{ secrets.SSH_PATH }}
        run: |
          set -eu
          missing=""
          [ -n "${SSH_HOST:-}" ] || missing="$missing SSH_HOST"
          [ -n "${SSH_PORT:-}" ] || missing="$missing SSH_PORT"
          [ -n "${SSH_USERNAME:-}" ] || missing="$missing SSH_USERNAME"
          [ -n "${SSH_PASSWORD:-}" ] || missing="$missing SSH_PASSWORD"
          [ -n "${SSH_PATH:-}" ] || missing="$missing SSH_PATH"

          if [ -n "$missing" ]; then
            echo "❌ Missing GitHub Actions secrets:$missing"
            echo "Set them in Settings → Secrets and variables → Actions before deploying."
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Test SSH connectivity
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "Testing SSH connectivity to $SSH_HOST:$SSH_PORT..."
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p "$SSH_PORT" "$SSH_USERNAME@$SSH_HOST" "echo ✅ SSH connection successful"

      - name: Deploy via SSH + rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PATH: ${{ secrets.SSH_PATH }}
        run: |
          set -eu

          SSH_PATH="${SSH_PATH%/}"
          case "$SSH_PATH" in
            /*) ;;
            *) SSH_PATH="/${SSH_PATH}" ;;
          esac

          echo "🚀 Deploying to $SSH_USERNAME@$SSH_HOST:$SSH_PORT$SSH_PATH..."

          # Retry logic: attempt up to 3 times
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            
            if sshpass -p "$SSH_PASSWORD" rsync -avz --progress -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o UserKnownHostsFile=/dev/null -p $SSH_PORT" \
              --delete \
              --exclude='.git*' \
              --exclude='.github/**' \
              --exclude='node_modules/**' \
              --exclude='data/**' \
              --exclude='.DS_Store' \
              --exclude='README.md' \
              --exclude='QUICKSTART.md' \
              --exclude='*.jsonl' \
              --exclude='package-lock.json' \
              ./ "$SSH_USERNAME@$SSH_HOST:$SSH_PATH"; then
              echo "✅ Deployment successful!"
              exit 0
            else
              if [ $attempt -lt 3 ]; then
                echo "❌ Attempt $attempt failed. Waiting 10 seconds before retry..."
                sleep 10
              fi
            fi
          done
          
          echo "❌ All 3 deployment attempts failed."
          exit 1