name: Static Site CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: none
          coverage: none

      - name: Validate PHP syntax
        run: |
          set -e
          find . -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Check required pages
        run: |
          test -f index.html
          test -f contact.html
          test -f tests.html