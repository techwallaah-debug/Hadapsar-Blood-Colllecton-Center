name: Static Site CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate PHP syntax
        run: |
          set -e
          find . -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -print0 | xargs -0 -n1 php -l

      - name: Check required pages
        run: |
          test -f index.html
          test -f contact.html
          test -f tests.html

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -eu
          missing=""
          [ -n "${FTP_SERVER:-}" ] || missing="$missing FTP_SERVER"
          [ -n "${FTP_USERNAME:-}" ] || missing="$missing FTP_USERNAME"
          [ -n "${FTP_PASSWORD:-}" ] || missing="$missing FTP_PASSWORD"
          [ -n "${FTP_SERVER_DIR:-}" ] || missing="$missing FTP_SERVER_DIR"

          if [ -n "$missing" ]; then
            echo "Missing GitHub Actions secrets:$missing"
            echo "Set them in Settings -> Secrets and variables -> Actions before deploying."
            exit 1
          fi

      - name: Test network connectivity to FTP server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing connectivity to FTP server..."
          FTP_SERVER="${FTP_SERVER#ftp://}"
          FTP_SERVER="${FTP_SERVER%/}"
          echo "Target: $FTP_SERVER:21"
          
          # Try DNS resolution
          echo "DNS Resolution Test:"
          nslookup "$FTP_SERVER" || echo "⚠️  DNS lookup failed, but proceeding with IP..."
          
          # Try to reach port 21
          echo "Port 21 Connectivity Test:"
          timeout 10 bash -c "echo > /dev/tcp/$FTP_SERVER/21" && echo "✅ Port 21 is open" || echo "⚠️  Port 21 unreachable, retrying in deploy step..."

      - name: Deploy to hosting server (with retry)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -eu

          FTP_SERVER="${FTP_SERVER#ftp://}"
          FTP_SERVER="${FTP_SERVER%/}"
          FTP_SERVER_DIR="${FTP_SERVER_DIR%/}"
          case "$FTP_SERVER_DIR" in
            /*) ;;
            *) FTP_SERVER_DIR="/${FTP_SERVER_DIR}" ;;
          esac

          # Retry logic: attempt up to 3 times
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            
            if lftp -e "
              set ftp:ssl-allow no;
              set ftp:passive-mode yes;
              set net:timeout 30;
              set net:max-retries 2;
              open -u \"${FTP_USERNAME}\",\"${FTP_PASSWORD}\" \"ftp://${FTP_SERVER}:21\";
              mirror -R --delete --verbose \
                --exclude-glob .git* \
                --exclude-glob .github/** \
                --exclude-glob node_modules/** \
                --exclude-glob data/** \
                --exclude-glob .DS_Store \
                --exclude-glob README.md \
                --exclude-glob QUICKSTART.md \
                ./ \"${FTP_SERVER_DIR}\";
              bye
            "; then
              echo "✅ Deployment successful!"
              exit 0
            else
              if [ $attempt -lt 3 ]; then
                echo "❌ Attempt $attempt failed. Waiting 10 seconds before retry..."
                sleep 10
              fi
            fi
          done
          
          echo "❌ All 3 deployment attempts failed."
          exit 1